<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Реестр сотрудников</title>
    <!-- Подключение Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 font-sans leading-normal tracking-normal">
    <div class="container mx-auto my-8 p-8 bg-white rounded-lg shadow">
        <h1 class="text-3xl font-bold mb-6 text-gray-800">Реестр сотрудников</h1>
        
        <!-- Панель управления (Фильтры) -->
        <div class="mb-6 grid grid-cols-1 md:grid-cols-4 gap-4">
            <input type="text" id="search" placeholder="Поиск (ФИО, Телефон)..." class="p-2 border rounded">
            <select id="gender" class="p-2 border rounded">
                <option value="">Любой пол</option>
                <option value="male">Мужской</option>
                <option value="female">Женский</option>
            </select>
            <div class="flex space-x-2">
                <input type="number" id="age_from" placeholder="Возраст от" class="p-2 border rounded w-1/2">
                <input type="number" id="age_to" placeholder="до" class="p-2 border rounded w-1/2">
            </div>
            <button onclick="fetchEmployees()" class="bg-blue-500 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded">
                Применить
            </button>
        </div>

        <!-- Таблица -->
        <div class="overflow-x-auto">
            <table class="min-w-full bg-white">
                <thead class="bg-gray-800 text-white">
                    <tr>
                        <th class="w-1/3 text-left py-3 px-4 uppercase font-semibold text-sm">ФИО</th>
                        <th class="text-left py-3 px-4 uppercase font-semibold text-sm">Телефон</th>
                        <th class="text-left py-3 px-4 uppercase font-semibold text-sm">Пол</th>
                        <th class="text-left py-3 px-4 uppercase font-semibold text-sm">Дата рождения</th>
                        <th class="text-left py-3 px-4 uppercase font-semibold text-sm">Действия</th>
                    </tr>
                </thead>
                <tbody id="employees-table-body" class="text-gray-700">
                    {% for emp in employees %}
                    <tr class="border-b hover:bg-gray-50">
                        <td class="py-3 px-4">{{ emp.last_name }} {{ emp.first_name }} {{ emp.patronymic or '' }}</td>
                        <td class="py-3 px-4">{{ emp.phone }}</td>
                        <td class="py-3 px-4">{{ 'Мужской' if emp.gender == 'male' else 'Женский' }}</td>
                        <td class="py-3 px-4">{{ emp.birth_date or '-' }}</td>
                        <td class="py-3 px-4">
                            <button onclick="deleteEmployee({{ emp.id }})" class="text-red-600 hover:text-red-950">Удалить</button>
                        </td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>

    <script>
        // JS функция для динамической фильтрации без перезагрузки страницы
        async function fetchEmployees() {
            const search = document.getElementById('search').value;
            const gender = document.getElementById('gender').value;
            const ageFrom = document.getElementById('age_from').value;
            const ageTo = document.getElementById('age_to').value;

            let url = `/api/v1/employee/?page=1&per_page=10`;
            if (search) url += `&search=${encodeURIComponent(search)}`;
            if (gender) url += `&gender=${gender}`;
            if (ageFrom) url += `&age_from=${ageFrom}`;
            if (ageTo) url += `&age_to=${ageTo}`;

            const response = await fetch(url);
            const data = await response.json();
            
            const tbody = document.getElementById('employees-table-body');
            tbody.innerHTML = '';
            
            data.items.forEach(emp => {
                tbody.innerHTML += `
                    <tr class="border-b hover:bg-gray-50">
                        <td class="py-3 px-4">${emp.last_name} ${emp.first_name} ${emp.patronymic || ''}</td>
                        <td class="py-3 px-4">${emp.phone}</td>
                        <td class="py-3 px-4">${emp.gender === 'male' ? 'Мужской' : 'Женский'}</td>
                        <td class="py-3 px-4">${emp.birth_date || '-'}</td>
                        <td class="py-3 px-4">
                            <button onclick="deleteEmployee(${emp.id})" class="text-red-600 hover:text-red-950">Удалить</button>
                        </td>
                    </tr>
                `;
            });
        }

        async function deleteEmployee(id) {
            if (confirm("Вы уверены, что хотите удалить сотрудника?")) {
                const response = await fetch(`/api/v1/employee/${id}`, { method: 'DELETE' });
                if (response.ok) {
                    fetchEmployees();
                }
            }
        }
    </script>
</body>
</html>
