<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Реестр сотрудников{% endblock %}</title>
    <!-- Подключение Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 font-sans leading-normal tracking-normal relative">
    
    <!-- Основной контент страницы -->
    {% block content %}{% endblock %}

    <!-- Сюда будут подключаться специфичные для страниц JS скрипты -->
    {% block scripts %}{% endblock %}
</body>
</html>
